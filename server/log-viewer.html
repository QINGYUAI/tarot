<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>日志查看</title>
  <style>
    :root {
      --bg: #0a0612;
      --surface: #161022;
      --surface2: #1f1630;
      --border: #322847;
      --text: #ece6f5;
      --muted: #9d8fb8;
      --accent: #8b5cf6;
      --accent2: #6d28d9;
      --info: #86efac;
      --warn: #fcd34d;
      --error: #f87171;
      --radius: 14px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #2a1845 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 16px 16px calc(16px + var(--safe-b));
      -webkit-tap-highlight-color: transparent;
    }
    .wrap { max-width: 960px; margin: 0 auto; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 12px;
    }
    .header h1 { font-size: 1.15rem; font-weight: 700; color: #ddd6fe; letter-spacing: 0.02em; }
    .header p { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    input, select {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: 16px; margin-bottom: 10px;
      appearance: none; -webkit-appearance: none;
    }
    input:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 18px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer;
      min-height: 44px; touch-action: manipulation;
    }
    .btn:active { transform: scale(0.98); }
    .btn.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-block { width: 100%; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-row .btn { flex: 1; min-width: 100px; }
    .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .filters .full { grid-column: 1 / -1; }
    .stats {
      font-size: 0.82rem; color: var(--muted);
      padding: 10px 12px; background: var(--surface2);
      border-radius: 10px; margin-bottom: 12px;
    }
    .log-list { display: flex; flex-direction: column; gap: 10px; }
    .log-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; cursor: pointer;
    }
    .log-item:active { background: #261a3a; }
    .log-top { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; }
    .badge {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      padding: 3px 8px; border-radius: 999px; letter-spacing: 0.04em;
    }
    .badge-info { background: rgba(134,239,172,0.15); color: var(--info); }
    .badge-warn { background: rgba(252,211,77,0.15); color: var(--warn); }
    .badge-error { background: rgba(248,113,113,0.15); color: var(--error); }
    .badge-cat { background: rgba(139,92,246,0.18); color: #c4b5fd; }
    .log-time { font-size: 0.72rem; color: var(--muted); margin-left: auto; }
    .log-msg { font-size: 0.9rem; line-height: 1.5; margin-bottom: 8px; word-break: break-word; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .chip {
      font-size: 0.72rem; padding: 4px 8px; border-radius: 6px;
      background: rgba(255,255,255,0.06); color: var(--muted);
    }
    .ai-box {
      margin-top: 10px; padding: 12px; border-radius: 10px;
      background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.25);
    }
    .ai-box h4 { font-size: 0.78rem; color: #c4b5fd; margin-bottom: 8px; }
    .ai-overview { font-size: 0.85rem; line-height: 1.6; color: #e9d5ff; margin-bottom: 8px; }
    .ai-section { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }
    .ai-section ul { padding-left: 18px; margin-top: 4px; }
    .ai-section li { margin-bottom: 4px; line-height: 1.5; color: var(--text); }
    .detail {
      display: none; margin-top: 10px; padding-top: 10px;
      border-top: 1px dashed var(--border);
      font-family: ui-monospace, monospace; font-size: 0.72rem;
      color: var(--muted); word-break: break-all; white-space: pre-wrap; line-height: 1.5;
    }
    .log-item.open .detail { display: block; }
    .pager {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-top: 16px; padding-bottom: var(--safe-b);
    }
    .pager span { font-size: 0.85rem; color: var(--muted); min-width: 80px; text-align: center; }
    .hidden { display: none !important; }
    .err { color: var(--error); font-size: 0.85rem; margin-top: 10px; text-align: center; }
    .empty { text-align: center; color: var(--muted); padding: 32px 16px; font-size: 0.9rem; }
    .login-card { max-width: 400px; margin: 40px auto 0; }
    @media (min-width: 640px) {
      body { padding: 24px; }
      .header h1 { font-size: 1.35rem; }
      .filters { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1>🔮 后端日志</h1>
        <p>独立管理页 · 仅地址栏访问</p>
      </div>
    </div>

    <div id="loginCard" class="card login-card">
      <label for="password">访问密码</label>
      <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password" />
      <button id="loginBtn" type="button" class="btn btn-block">登录</button>
      <p id="loginErr" class="err hidden"></p>
    </div>

    <div id="viewer" class="hidden">
      <div class="card">
        <div class="filters">
          <div class="full"><label for="fileSelect">日志文件</label><select id="fileSelect"></select></div>
          <div><label for="levelFilter">级别</label><select id="levelFilter"><option value="">全部</option><option value="info">info</option><option value="warn">warn</option><option value="error">error</option></select></div>
          <div><label for="categoryFilter">分类</label><select id="categoryFilter"><option value="">全部</option><option value="interpret">interpret</option><option value="ai">ai</option><option value="http">http</option><option value="system">system</option></select></div>
          <div class="full"><label for="keyword">关键词</label><input id="keyword" type="text" placeholder="问题 / requestId / 模型" enterkeyhint="search" /></div>
          <div class="full btn-row">
            <button id="searchBtn" type="button" class="btn">查询</button>
            <button id="logoutBtn" type="button" class="btn secondary">退出</button>
          </div>
        </div>
      </div>

      <p id="stats" class="stats"></p>
      <div id="logList" class="log-list"></div>
      <div class="pager">
        <button id="prevBtn" type="button" class="btn secondary">上一页</button>
        <span id="pageInfo">-</span>
        <button id="nextBtn" type="button" class="btn secondary">下一页</button>
      </div>
    </div>
  </div>
  <script>
    const API = '/api/internal/logs';
    let page = 1;
    const limit = 30;
    const $ = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const res = await fetch(API + path, { credentials: 'same-origin', headers: { 'Content-Type': 'application/json' }, ...options });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderAiResult(ai) {
      if (!ai) return '';
      let html = '<div class="ai-box"><h4>✨ AI 解读结果</h4>';
      if (ai.overview) html += '<div class="ai-overview">' + escapeHtml(ai.overview) + '</div>';
      if (ai.positions && ai.positions.length) {
        html += '<div class="ai-section"><strong>牌位解读</strong><ul>';
        ai.positions.forEach(p => { html += '<li>位置' + p.position + '：' + escapeHtml(p.text) + '</li>'; });
        html += '</ul></div>';
      }
      if (ai.suggestions && ai.suggestions.length) {
        html += '<div class="ai-section"><strong>建议</strong><ul>';
        ai.suggestions.forEach(s => { html += '<li>' + escapeHtml(s) + '</li>'; });
        html += '</ul></div>';
      }
      if (ai.cautions && ai.cautions.length) {
        html += '<div class="ai-section"><strong>注意</strong><ul>';
        ai.cautions.forEach(c => { html += '<li>' + escapeHtml(c) + '</li>'; });
        html += '</ul></div>';
      }
      html += '</div>';
      return html;
    }

    function renderLogItem(e) {
      const { time, level, category, message, aiResult, ...meta } = e;
      const chips = [];
      if (meta.model) chips.push('模型: ' + meta.model);
      if (meta.mode) chips.push(meta.mode);
      if (meta.tokens) chips.push('tokens: ' + meta.tokens);
      if (meta.durationMs) chips.push(meta.durationMs + 'ms');
      if (meta.mock) chips.push('模拟');
      if (meta.question) chips.push('问: ' + meta.question);
      if (meta.clientIp) chips.push(meta.clientIp);

      const chipHtml = chips.map(c => '<span class="chip">' + escapeHtml(c) + '</span>').join('');
      const metaForDetail = { ...meta };
      delete metaForDetail.question;

      return '<div class="log-item" onclick="this.classList.toggle(\'open\')">' +
        '<div class="log-top">' +
          '<span class="badge badge-' + level + '">' + level + '</span>' +
          '<span class="badge badge-cat">' + category + '</span>' +
          '<span class="log-time">' + new Date(time).toLocaleString('zh-CN') + '</span>' +
        '</div>' +
        '<div class="log-msg">' + escapeHtml(message) + '</div>' +
        (chipHtml ? '<div class="chips">' + chipHtml + '</div>' : '') +
        renderAiResult(aiResult) +
        '<div class="detail">' + escapeHtml(JSON.stringify({ requestId: meta.requestId, ...metaForDetail }, null, 2)) + '</div>' +
      '</div>';
    }

    function showLogin() { $('loginCard').classList.remove('hidden'); $('viewer').classList.add('hidden'); }
    function showViewer() { $('loginCard').classList.add('hidden'); $('viewer').classList.remove('hidden'); }

    async function checkAuth() {
      try { await api('/files'); showViewer(); await loadFiles(); await loadLogs(); }
      catch { showLogin(); }
    }

    $('loginBtn').onclick = async () => {
      $('loginErr').classList.add('hidden');
      try {
        await api('/login', { method: 'POST', body: JSON.stringify({ password: $('password').value }) });
        showViewer(); await loadFiles(); page = 1; await loadLogs();
      } catch (e) { $('loginErr').textContent = e.message; $('loginErr').classList.remove('hidden'); }
    };
    $('password').onkeydown = (e) => { if (e.key === 'Enter') $('loginBtn').click(); };
    $('keyword').onkeydown = (e) => { if (e.key === 'Enter') { page = 1; loadLogs(); } };
    $('logoutBtn').onclick = async () => { await api('/logout', { method: 'POST' }).catch(() => {}); showLogin(); $('password').value = ''; };

    async function loadFiles() {
      const { files } = await api('/files');
      $('fileSelect').innerHTML = files.length
        ? files.map(f => '<option value="' + f + '">' + f + '</option>').join('')
        : '<option value="">无日志文件</option>';
    }

    async function loadLogs() {
      if (!$('fileSelect').value) {
        $('logList').innerHTML = '<div class="empty">暂无日志文件</div>';
        return;
      }
      const params = new URLSearchParams({ file: $('fileSelect').value, page: String(page), limit: String(limit) });
      if ($('levelFilter').value) params.set('level', $('levelFilter').value);
      if ($('categoryFilter').value) params.set('category', $('categoryFilter').value);
      if ($('keyword').value.trim()) params.set('keyword', $('keyword').value.trim());
      const data = await api('/entries?' + params.toString());
      $('stats').textContent = '共 ' + data.total + ' 条 · 第 ' + data.page + '/' + data.totalPages + ' 页';
      $('pageInfo').textContent = data.page + ' / ' + data.totalPages;
      $('prevBtn').disabled = data.page <= 1;
      $('nextBtn').disabled = data.page >= data.totalPages;
      $('logList').innerHTML = data.entries.length
        ? data.entries.map(renderLogItem).join('')
        : '<div class="empty">没有匹配的日志</div>';
    }

    $('searchBtn').onclick = () => { page = 1; loadLogs(); };
    $('fileSelect').onchange = () => { page = 1; loadLogs(); };
    $('prevBtn').onclick = () => { if (page > 1) { page--; loadLogs(); } };
    $('nextBtn').onclick = () => { if (!$('nextBtn').disabled) { page++; loadLogs(); } };
    checkAuth();
  </script>
</body>
</html>
